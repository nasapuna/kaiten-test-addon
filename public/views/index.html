<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <script src="https://files.kaiten.ru/web-sdk/v1.min.js"></script>
  <link href="https://files.kaiten.ru/web-sdk/v1.min.css" rel="stylesheet" />
</head>

<body>
  <button id="myBtn">Нажать</button>

  <script>
    const kaiten = new KaitenSDK();

    kaiten.onReady(() => {
      console.log("Addon loaded");
    });

    document.getElementById("myBtn").onclick = async () => {
      const context = await kaiten.getContext();
      alert("Card ID: " + context.card.id);
    };
  </script>
</body>

</html>
