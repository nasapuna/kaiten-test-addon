<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Настройки</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .box {
      padding: 24px 28px;
      border: 1px solid rgba(127,127,127,.35);
      border-radius: 12px;
      text-align: center;
      max-width: 680px;
    }
    h1 { margin: 0; font-size: 22px; font-weight: 700; }
    p { margin: 10px 0 0; opacity: .8; }
  </style>
</head>
<body>
  <main class="box">
    <h1>здесь должны быть настройки</h1>
    <p>Заглушка страницы для iframe аддона.</p>
  </main>
</body>
</html>
